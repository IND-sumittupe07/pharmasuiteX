services:
  - type: web
    name: pharmasuitex-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/db/migrate_all.js && node src/db/seed.js && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://pharmasuitex.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: pharmasuitex-db
          property: connectionString

databases:
  - name: pharmasuitex-db
    databaseName: pharmasuitex
    user: pharmasuitex_user
    plan: free
